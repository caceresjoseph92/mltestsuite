{{define "content"}}
<div style="margin-bottom:24px;">
    <a href="/testcases/{{.TestCase.ID}}" style="color:#009EE3; font-size:13px; font-weight:600; text-decoration:none;">&larr; Volver al caso</a>
</div>

<div style="max-width:640px;">
    <h1 style="font-size:22px; font-weight:800; color:#1C1C1E; margin:0 0 24px;">Editar Caso de Prueba</h1>

    <div style="background:white; border-radius:12px; border:1px solid #E5E7EB; padding:28px; box-shadow:0 1px 4px rgba(0,0,0,0.05);">
        <form method="POST" action="/testcases/{{.TestCase.ID}}">
            <input type="hidden" name="_method" value="PUT">
            <div style="margin-bottom:20px;">
                <label style="display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:6px;">Reporte</label>
                <select name="report_id" required
                    style="width:100%; border:1.5px solid #E5E7EB; border-radius:8px; padding:10px 14px; font-size:14px; outline:none; transition:border 0.2s; box-sizing:border-box; background:white;"
                    onfocus="this.style.borderColor='#009EE3'" onblur="this.style.borderColor='#E5E7EB'">
                    {{range .Reports}}<option value="{{.ID}}" {{if eq .ID $.TestCase.ReportID}}selected{{end}}>{{.TeamName}} / {{.Name}}</option>{{end}}
                </select>
            </div>
            <div style="margin-bottom:20px;">
                <label style="display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:6px;">Titulo</label>
                <input type="text" name="title" value="{{.TestCase.Title}}" required
                    style="width:100%; border:1.5px solid #E5E7EB; border-radius:8px; padding:10px 14px; font-size:14px; outline:none; transition:border 0.2s; box-sizing:border-box;"
                    onfocus="this.style.borderColor='#009EE3'" onblur="this.style.borderColor='#E5E7EB'">
            </div>
            <div style="margin-bottom:20px;">
                <label style="display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:10px;">Prioridad</label>
                <div style="display:flex; gap:16px;">
                    {{range .Priorities}}
                    <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:14px; color:#374151;">
                        <input type="radio" name="priority" value="{{.}}" {{if eq (printf "%s" .) (printf "%s" $.TestCase.Priority)}}checked{{end}} style="accent-color:#009EE3;">
                        {{if eq (printf "%s" .) "high"}}
                        <span style="background:#FEE2E2; color:#991B1B; padding:2px 10px; border-radius:20px; font-size:12px; font-weight:600;">high</span>
                        {{else if eq (printf "%s" .) "medium"}}
                        <span style="background:#FEF3C7; color:#92400E; padding:2px 10px; border-radius:20px; font-size:12px; font-weight:600;">medium</span>
                        {{else}}
                        <span style="background:#D1FAE5; color:#065F46; padding:2px 10px; border-radius:20px; font-size:12px; font-weight:600;">low</span>
                        {{end}}
                    </label>
                    {{end}}
                </div>
            </div>
            <div style="margin-bottom:20px;">
                <label style="display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:6px;">Precondiciones</label>
                <textarea name="preconditions" rows="3"
                    style="width:100%; border:1.5px solid #E5E7EB; border-radius:8px; padding:10px 14px; font-size:14px; outline:none; transition:border 0.2s; box-sizing:border-box; resize:vertical;"
                    onfocus="this.style.borderColor='#009EE3'" onblur="this.style.borderColor='#E5E7EB'">{{.TestCase.Preconditions}}</textarea>
            </div>
            <div style="margin-bottom:20px;">
                <label style="display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:6px;">Pasos</label>
                <textarea name="steps" rows="5"
                    style="width:100%; border:1.5px solid #E5E7EB; border-radius:8px; padding:10px 14px; font-size:14px; outline:none; transition:border 0.2s; box-sizing:border-box; resize:vertical;"
                    onfocus="this.style.borderColor='#009EE3'" onblur="this.style.borderColor='#E5E7EB'">{{.TestCase.Steps}}</textarea>
            </div>
            <div style="margin-bottom:24px;">
                <label style="display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:6px;">Resultado Esperado</label>
                <textarea name="expected_result" rows="3"
                    style="width:100%; border:1.5px solid #E5E7EB; border-radius:8px; padding:10px 14px; font-size:14px; outline:none; transition:border 0.2s; box-sizing:border-box; resize:vertical;"
                    onfocus="this.style.borderColor='#009EE3'" onblur="this.style.borderColor='#E5E7EB'">{{.TestCase.ExpectedResult}}</textarea>
            </div>
            <button type="submit" style="background:#009EE3; color:white; border:none; padding:10px 24px; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; transition:background 0.2s;"
                onmouseover="this.style.background='#0077B6'" onmouseout="this.style.background='#009EE3'">
                Guardar Cambios
            </button>
        </form>
    </div>
</div>
{{end}}
