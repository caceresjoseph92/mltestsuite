{{define "register.html"}}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro -- MLTestSuite</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background:#F5F5F5; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
    <div style="width:100%; max-width:400px;">
        <div style="background:white; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.10); overflow:hidden;">
            <!-- Yellow header -->
            <div style="background:#FFE600; padding:28px 32px 24px;">
                <div style="display:flex; align-items:center; gap:12px;">
                    <div style="background:#1C1C1E; width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center;">
                        <span style="color:#FFE600; font-weight:900; font-size:18px;">ML</span>
                    </div>
                    <div>
                        <div style="font-weight:800; font-size:20px; color:#1C1C1E;">MLTestSuite</div>
                        <div style="font-size:12px; color:#555;">ADR &middot; Reports QA Platform</div>
                    </div>
                </div>
            </div>
            <!-- Form -->
            <div style="padding:28px 32px;">
                <h2 style="font-size:18px; font-weight:700; color:#1C1C1E; margin-bottom:20px;">Crear cuenta</h2>
                {{if .Error}}<div style="background:#FEE2E2; color:#991B1B; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px;">{{.Error}}</div>{{end}}
                <form method="POST" action="/register">
                    <div style="margin-bottom:16px;">
                        <label style="display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:6px;">Nombre</label>
                        <input type="text" name="name" value="{{.Name}}" required
                            style="width:100%; border:1.5px solid #E5E7EB; border-radius:8px; padding:10px 14px; font-size:14px; outline:none; transition:border 0.2s; box-sizing:border-box;"
                            onfocus="this.style.borderColor='#009EE3'" onblur="this.style.borderColor='#E5E7EB'">
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:6px;">Email</label>
                        <input type="email" name="email" value="{{.Email}}" required
                            style="width:100%; border:1.5px solid #E5E7EB; border-radius:8px; padding:10px 14px; font-size:14px; outline:none; transition:border 0.2s; box-sizing:border-box;"
                            onfocus="this.style.borderColor='#009EE3'" onblur="this.style.borderColor='#E5E7EB'">
                    </div>
                    <div style="margin-bottom:24px;">
                        <label style="display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:6px;">Contrasena</label>
                        <input type="password" name="password" required
                            style="width:100%; border:1.5px solid #E5E7EB; border-radius:8px; padding:10px 14px; font-size:14px; outline:none; transition:border 0.2s; box-sizing:border-box;"
                            onfocus="this.style.borderColor='#009EE3'" onblur="this.style.borderColor='#E5E7EB'">
                    </div>
                    <button type="submit" style="width:100%; background:#009EE3; color:white; border:none; border-radius:8px; padding:12px; font-size:15px; font-weight:700; cursor:pointer; transition:background 0.2s;"
                        onmouseover="this.style.background='#0077B6'" onmouseout="this.style.background='#009EE3'">
                        Registrarse
                    </button>
                </form>
                <p style="text-align:center; margin-top:16px; font-size:13px; color:#6B7280;">
                    Ya tienes cuenta? <a href="/login" style="color:#009EE3; font-weight:600; text-decoration:none;">Ingresar</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
{{end}}
