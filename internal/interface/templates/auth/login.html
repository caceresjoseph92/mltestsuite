{{define "login.html"}}<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Login - MLTestSuite</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
<div class="bg-white p-8 rounded shadow-md w-96">
    <h1 class="text-2xl font-bold mb-6 text-center">MLTestSuite</h1>
    {{if .Error}}<div class="bg-red-100 text-red-800 p-2 rounded mb-4">{{.Error}}</div>{{end}}
    <form method="POST" action="/login">
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Email</label>
            <input type="email" name="email" value="{{.Email}}" class="w-full border rounded p-2" required>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Contraseña</label>
            <input type="password" name="password" class="w-full border rounded p-2" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Ingresar</button>
    </form>
    <p class="text-center mt-4 text-sm">¿No tienes cuenta? <a href="/register" class="text-blue-600 hover:underline">Registrarse</a></p>
</div>
</body>
</html>{{end}}
