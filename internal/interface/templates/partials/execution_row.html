{{define "partials/execution_row.html"}}
<div id="field-{{.Field.FieldName}}" style="background:white; border-radius:12px; border:1px solid #E5E7EB; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.05);">
    <!-- Header con resultado -->
    <div style="display:flex; align-items:center; gap:10px; padding:12px 20px; background:#F9FAFB; border-bottom:1px solid #E5E7EB;">
        <code style="font-size:13px; font-weight:700; color:#1C1C1E; background:white; border:1px solid #E5E7EB; padding:3px 8px; border-radius:6px;">{{.Field.FieldName}}</code>
        {{if .Field.ErrorMsg}}
            <span style="background:#FEF3C7; color:#92400E; padding:3px 12px; border-radius:20px; font-size:12px; font-weight:800;">⚠ {{.Field.ErrorMsg}}</span>
        {{else if .Field.Matches}}
            {{if derefBool .Field.Matches}}
            <span style="background:#D1FAE5; color:#065F46; padding:3px 12px; border-radius:20px; font-size:12px; font-weight:800;">✓ EXITOSO</span>
            {{else}}
            <span style="background:#FEE2E2; color:#991B1B; padding:3px 12px; border-radius:20px; font-size:12px; font-weight:800;">✗ FALLIDO</span>
            {{end}}
        {{end}}
    </div>
    <!-- Comparación 3 columnas: Esperado | Comparar | Actual -->
    <form hx-post="/executions/{{.Field.ExecutionID}}/compare"
          hx-target="#field-{{.Field.FieldName}}"
          hx-swap="outerHTML">
        <input type="hidden" name="field_name" value="{{.Field.FieldName}}">
        <div style="display:grid; grid-template-columns:1fr 80px 1fr;">
            <div style="padding:16px; border-right:1px solid #F3F4F6;">
                <p style="font-size:11px; font-weight:800; color:#6B7280; text-transform:uppercase; letter-spacing:0.05em; margin:0 0 8px;">Esperado</p>
                <pre style="font-size:11px; margin:0; color:#374151; font-family:'SF Mono',Monaco,monospace; background:#F9FAFB; padding:10px; border-radius:8px; white-space:pre-wrap; word-break:break-all; min-height:80px;">{{.Field.ExpectedJSON}}</pre>
            </div>
            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding:16px; border-right:1px solid #F3F4F6; gap:8px;">
                <svg width="18" height="18" fill="none" stroke="#9CA3AF" stroke-width="2" viewBox="0 0 24 24"><path d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
                <button type="submit"
                    style="background:#1C1C1E; color:#FFE600; border:none; padding:8px 10px; border-radius:8px; font-size:11px; font-weight:800; cursor:pointer; white-space:nowrap;"
                    onmouseover="this.style.background='#374151'" onmouseout="this.style.background='#1C1C1E'">
                    Comparar
                </button>
            </div>
            <div style="padding:16px;">
                <p style="font-size:11px; font-weight:800; color:#6B7280; text-transform:uppercase; letter-spacing:0.05em; margin:0 0 8px;">Tu respuesta actual</p>
                <textarea name="actual_json" rows="6" required
                    style="width:100%; border:1.5px solid #E5E7EB; border-radius:8px; padding:10px; font-size:11px; outline:none; box-sizing:border-box; resize:vertical; font-family:'SF Mono',Monaco,monospace;"
                    onfocus="this.style.borderColor='#009EE3'" onblur="this.style.borderColor='#E5E7EB'">{{.Field.ActualJSON}}</textarea>
            </div>
        </div>
    </form>
</div>
{{end}}
