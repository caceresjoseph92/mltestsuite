{{define "partials/execution_row.html"}}
<div style="margin-bottom:12px; padding:12px; background:#F9FAFB; border-radius:8px; border:1px solid #F3F4F6;">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
        <strong style="font-size:13px; color:#1C1C1E;">{{.Field.FieldName}}</strong>
        {{if .Field.Matches}}
            {{if derefBool .Field.Matches}}
            <span style="background:#D1FAE5; color:#065F46; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700;">MATCH</span>
            {{else}}
            <span style="background:#FEE2E2; color:#991B1B; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700;">NO MATCH</span>
            {{end}}
        {{end}}
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        <div>
            <p style="font-size:11px; font-weight:700; color:#6B7280; margin:0 0 4px;">Esperado:</p>
            <pre style="font-size:12px; margin:0; overflow-x:auto; color:#374151; font-family:'SF Mono',Monaco,monospace; background:white; padding:8px; border-radius:6px; border:1px solid #E5E7EB;">{{.Field.ExpectedJSON}}</pre>
        </div>
        <div>
            <p style="font-size:11px; font-weight:700; color:#6B7280; margin:0 0 4px;">Actual:</p>
            <pre style="font-size:12px; margin:0; overflow-x:auto; color:#374151; font-family:'SF Mono',Monaco,monospace; background:white; padding:8px; border-radius:6px; border:1px solid #E5E7EB;">{{.Field.ActualJSON}}</pre>
        </div>
    </div>
</div>
{{end}}
