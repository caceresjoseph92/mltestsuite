{{define "content"}}
<h1 class="text-2xl font-bold mb-6">Nuevo Reporte</h1>
<div class="bg-white rounded shadow p-6 max-w-lg">
    <form method="POST" action="/reports">
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Equipo</label>
            <select name="team_id" class="w-full border rounded p-2" required>
                <option value="">Seleccionar...</option>
                {{range .Teams}}<option value="{{.ID}}">{{.Name}}</option>{{end}}
            </select>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Nombre</label>
            <input type="text" name="name" class="w-full border rounded p-2" required>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Tipo de Reporte</label>
            <input type="text" name="report_type" class="w-full border rounded p-2" placeholder="e.g., API, UI, Integration" required>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Descripción</label>
            <textarea name="description" class="w-full border rounded p-2" rows="3"></textarea>
        </div>
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Crear Reporte</button>
    </form>
</div>
{{end}}
