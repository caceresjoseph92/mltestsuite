{{define "content"}}
<div style="margin-bottom:24px;">
    <a href="/reports" style="color:#009EE3; font-size:13px; font-weight:600; text-decoration:none;">&larr; Volver a Reportes</a>
</div>

<div style="max-width:560px;">
    <h1 style="font-size:22px; font-weight:800; color:#1C1C1E; margin:0 0 24px;">Nuevo Reporte</h1>

    <div style="background:white; border-radius:12px; border:1px solid #E5E7EB; padding:28px; box-shadow:0 1px 4px rgba(0,0,0,0.05);">
        <form method="POST" action="/reports">
            <div style="margin-bottom:20px;">
                <label style="display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:6px;">Equipo</label>
                <select name="team_id" required
                    style="width:100%; border:1.5px solid #E5E7EB; border-radius:8px; padding:10px 14px; font-size:14px; outline:none; transition:border 0.2s; box-sizing:border-box; background:white;"
                    onfocus="this.style.borderColor='#009EE3'" onblur="this.style.borderColor='#E5E7EB'">
                    <option value="">Seleccionar...</option>
                    {{range .Teams}}<option value="{{.ID}}">{{.Name}}</option>{{end}}
                </select>
            </div>
            <div style="margin-bottom:20px;">
                <label style="display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:6px;">Nombre del Reporte</label>
                <input type="text" name="name" placeholder="e.g., Estado de cuenta" required
                    style="width:100%; border:1.5px solid #E5E7EB; border-radius:8px; padding:10px 14px; font-size:14px; outline:none; transition:border 0.2s; box-sizing:border-box;"
                    onfocus="this.style.borderColor='#009EE3'" onblur="this.style.borderColor='#E5E7EB'">
            </div>
            <div style="margin-bottom:20px;">
                <label style="display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:6px;">UUID del Reporte</label>
                <input type="text" name="report_type" placeholder="e.g., account_status" required
                    style="width:100%; border:1.5px solid #E5E7EB; border-radius:8px; padding:10px 14px; font-size:14px; outline:none; transition:border 0.2s; box-sizing:border-box;"
                    onfocus="this.style.borderColor='#009EE3'" onblur="this.style.borderColor='#E5E7EB'">
            </div>
            <div style="margin-bottom:24px;">
                <label style="display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:6px;">Descripcion</label>
                <textarea name="description" rows="3"
                    style="width:100%; border:1.5px solid #E5E7EB; border-radius:8px; padding:10px 14px; font-size:14px; outline:none; transition:border 0.2s; box-sizing:border-box; resize:vertical;"
                    onfocus="this.style.borderColor='#009EE3'" onblur="this.style.borderColor='#E5E7EB'"></textarea>
            </div>
            <button type="submit" style="background:#009EE3; color:white; border:none; padding:10px 24px; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; transition:background 0.2s;"
                onmouseover="this.style.background='#0077B6'" onmouseout="this.style.background='#009EE3'">
                Crear Reporte
            </button>
        </form>
    </div>
</div>
{{end}}
