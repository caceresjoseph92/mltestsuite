{{define "content"}}
<h1 class="text-2xl font-bold mb-6">Nuevo Release</h1>
<div class="bg-white rounded shadow p-6 max-w-lg">
    <form method="POST" action="/releases">
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Versión</label>
            <input type="text" name="version" class="w-full border rounded p-2" placeholder="v1.0.0" required>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Descripción</label>
            <textarea name="description" class="w-full border rounded p-2" rows="3"></textarea>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Link del PR</label>
            <input type="url" name="pr_link" class="w-full border rounded p-2" placeholder="https://github.com/...">
        </div>
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Crear Release</button>
    </form>
</div>
{{end}}
